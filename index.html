<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner Tool</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* ── RESET ───────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #7c3aed;
            --glow:    #a78bfa;
            --cyan:    #22d3ee;
            --green:   #10b981;
            --border:  rgba(167,139,250,0.25);
        }

        /* ── BODY + STAR LAYERS ──────────────────────────────────── */
        body {
            font-family: 'Exo 2', sans-serif;
            background: radial-gradient(ellipse at 20% 50%, #1a0533 0%, #0d0221 60%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(1px 1px at 10% 15%, rgba(167,139,250,0.8) 0%, transparent 100%),
                radial-gradient(1px 1px at 25% 40%, rgba(34,211,238,0.6) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 40% 10%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1px 1px at 55% 60%, rgba(167,139,250,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 25%, rgba(34,211,238,0.7) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 80% 75%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 45%, rgba(167,139,250,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 15% 80%, rgba(34,211,238,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 35% 55%, rgba(167,139,250,0.7) 0%, transparent 100%),
                radial-gradient(1px 1px at 75% 5%,  rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 5%  50%, rgba(34,211,238,0.4) 0%, transparent 100%);
            animation: starDrift1 18s linear infinite;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(1px 1px at 20% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 45% 30%, rgba(167,139,250,0.7) 0%, transparent 100%),
                radial-gradient(1px 1px at 65% 55%, rgba(34,211,238,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 85% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 30% 85%, rgba(167,139,250,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 50% 5%,  rgba(34,211,238,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 95% 65%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 8%  35%, rgba(167,139,250,0.6) 0%, transparent 100%);
            animation: starDrift2 25s linear infinite reverse;
        }

        @keyframes starDrift1 {
            0%,100% { transform: translateY(0) translateX(0); }
            50%     { transform: translateY(-15px) translateX(8px); }
        }
        @keyframes starDrift2 {
            0%,100% { transform: translateY(0) scale(1); }
            50%     { transform: translateY(12px) scale(1.02); }
        }

        /* ── AMBIENT ORBS ────────────────────────────────────────── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            animation: orbFloat 8s ease-in-out infinite;
            z-index: 0;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(124,58,237,0.3), transparent 70%);
            top: -100px; left: -100px;
        }
        .orb-2 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(34,211,238,0.2), transparent 70%);
            bottom: -80px; right: -80px;
            animation-delay: -4s;
        }
        .orb-3 {
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(167,139,250,0.25), transparent 70%);
            top: 50%; right: 10%;
            animation-delay: -2s;
        }
        @keyframes orbFloat {
            0%,100% { transform: translate(0,0) scale(1); }
            33%     { transform: translate(20px,-20px) scale(1.05); }
            66%     { transform: translate(-15px,15px) scale(0.95); }
        }

        /* ── SPARKLE PARTICLES ───────────────────────────────────── */
        .particle {
            position: fixed;
            width: 4px; height: 4px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }
        .particle:nth-child(1) { background: var(--glow); top: 20%; left: 5%;   animation: float1 7s ease-in-out infinite; }
        .particle:nth-child(2) { background: var(--cyan); top: 70%; left: 8%;   animation: float2 9s ease-in-out infinite 1s; }
        .particle:nth-child(3) { background: #fff;        top: 40%; right: 6%;  animation: float3 6s ease-in-out infinite 2s; }
        .particle:nth-child(4) { background: var(--glow); top: 85%; right: 9%;  animation: float1 8s ease-in-out infinite 0.5s; }
        .particle:nth-child(5) { background: var(--cyan); top: 10%; right: 15%; animation: float2 10s ease-in-out infinite 3s; }
        .particle:nth-child(6) { width:3px;height:3px; background:#fff; top:55%; left:3%; animation: float3 5s ease-in-out infinite 1.5s; }

        @keyframes float1 {
            0%,100% { transform: translate(0,0) scale(1); opacity: 0.6; }
            33%     { transform: translate(12px,-18px) scale(1.3); opacity: 1; }
            66%     { transform: translate(-8px,10px) scale(0.8); opacity: 0.4; }
        }
        @keyframes float2 {
            0%,100% { transform: translate(0,0); opacity: 0.4; }
            50%     { transform: translate(-14px,-22px); opacity: 0.9; }
        }
        @keyframes float3 {
            0%,100% { transform: translateY(0) rotate(0deg); opacity: 0.5; }
            50%     { transform: translateY(-20px) rotate(180deg); opacity: 1; }
        }

        /* ── MAIN CARD ───────────────────────────────────────────── */
        .container {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 36px 30px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow:
                0 0 0 1px rgba(167,139,250,0.08),
                0 20px 60px rgba(0,0,0,0.6),
                0 0 80px rgba(124,58,237,0.15),
                inset 0 1px 0 rgba(255,255,255,0.07);
            animation: cardIn 0.9s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Shimmer sweep */
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: -60%;
            width: 60%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(167,139,250,0.8), transparent);
            border-radius: 99px;
            animation: shimmerLine 4s ease-in-out infinite;
        }
        @keyframes shimmerLine {
            0%   { left: -60%; opacity: 0; }
            20%  { opacity: 1; }
            80%  { opacity: 1; }
            100% { left: 160%; opacity: 0; }
        }

        /* Corner gradient overlay */
        .container::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 24px;
            background: linear-gradient(135deg,
                rgba(167,139,250,0.12) 0%,
                transparent 40%,
                transparent 60%,
                rgba(34,211,238,0.08) 100%);
            pointer-events: none;
            animation: cornerGlow 6s ease-in-out infinite alternate;
        }
        @keyframes cornerGlow {
            from { opacity: 0.5; }
            to   { opacity: 1; }
        }

        /* ── TITLE ───────────────────────────────────────────────── */
        h2 {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.08em;
            margin-bottom: 28px;
            line-height: 1.6;
            background: linear-gradient(135deg, #fff 0%, var(--glow) 50%, var(--cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleIn 1s 0.3s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes titleIn {
            from { opacity: 0; transform: translateY(-12px); letter-spacing: 0.3em; }
            to   { opacity: 1; transform: translateY(0);     letter-spacing: 0.08em; }
        }

        /* ── READER ──────────────────────────────────────────────── */
        #reader {
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            border: none !important;
            position: relative;
            animation: readerIn 1s 0.5s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes readerIn {
            from { opacity: 0; transform: scale(0.92); }
            to   { opacity: 1; transform: scale(1); }
        }

        /* Animated rainbow border ring */
        #reader::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--glow), var(--cyan), var(--primary), var(--glow));
            background-size: 300% 300%;
            animation: borderRotate 4s linear infinite;
            z-index: -1;
        }
        @keyframes borderRotate {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Scan beam inside the video region */
        #reader__scan_region {
            border-radius: 14px;
            overflow: hidden;
            position: relative;
        }

        #reader__scan_region::after {
            content: '';
            position: absolute;
            left: 8%; right: 8%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), var(--glow), var(--cyan), transparent);
            box-shadow: 0 0 12px var(--cyan), 0 0 28px rgba(34,211,238,0.4);
            border-radius: 99px;
            top: 10%;
            animation: scanBeam 2.2s ease-in-out infinite;
            pointer-events: none;
            z-index: 5;
        }
        @keyframes scanBeam {
            0%   { top: 10%; opacity: 1; }
            48%  { opacity: 1; }
            50%  { top: 88%; opacity: 0.3; }
            52%  { top: 10%; opacity: 0; }
            56%  { opacity: 1; }
            100% { top: 10%; opacity: 1; }
        }

        /* Corner bracket glow overlay */
        #reader__scan_region::before {
            content: '';
            position: absolute;
            inset: 10px;
            border: 1.5px solid rgba(167,139,250,0.35);
            border-radius: 6px;
            pointer-events: none;
            z-index: 4;
            animation: bracketPulse 3s ease-in-out infinite;
            box-shadow: inset 0 0 20px rgba(124,58,237,0.1);
        }
        @keyframes bracketPulse {
            0%,100% { opacity: 0.4; }
            50%     { opacity: 1; box-shadow: inset 0 0 30px rgba(124,58,237,0.2), 0 0 15px rgba(167,139,250,0.15); }
        }

        /* Library buttons */
        #reader button {
            background: linear-gradient(135deg, var(--primary), #6d28d9) !important;
            color: #fff !important;
            border: none !important;
            padding: 10px 22px !important;
            border-radius: 10px !important;
            cursor: pointer !important;
            font-family: 'Exo 2', sans-serif !important;
            font-weight: 600 !important;
            font-size: 0.85rem !important;
            letter-spacing: 0.04em !important;
            margin: 8px 4px !important;
            transition: transform 0.2s, box-shadow 0.2s !important;
            box-shadow: 0 4px 15px rgba(124,58,237,0.4) !important;
        }
        #reader button:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 8px 25px rgba(124,58,237,0.6) !important;
        }
        #reader button:active { transform: translateY(0) !important; }

        #reader select {
            background: rgba(255,255,255,0.08) !important;
            color: #fff !important;
            border: 1px solid var(--border) !important;
            border-radius: 8px !important;
            padding: 6px 10px !important;
            font-family: 'Exo 2', sans-serif !important;
            font-size: 0.82rem !important;
        }

        #reader video {
            border-radius: 14px !important;
            display: block;
        }

        /* ── RESULT CARD ─────────────────────────────────────────── */
        .result-card {
            margin-top: 24px;
            padding: 18px 20px 18px 26px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(167,139,250,0.18);
            border-radius: 14px;
            word-wrap: break-word;
            position: relative;
            overflow: hidden;
            animation: resultCardIn 1s 0.7s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes resultCardIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Left accent bar */
        .result-card::before {
            content: '';
            position: absolute;
            left: 0; top: 15%; bottom: 15%;
            width: 3px;
            border-radius: 99px;
            background: linear-gradient(180deg, var(--cyan), var(--glow));
            animation: barPulse 2s ease-in-out infinite;
        }
        @keyframes barPulse {
            0%,100% { opacity: 0.5; }
            50%     { opacity: 1; box-shadow: 0 0 12px var(--glow); }
        }

        /* Shimmer over result */
        .result-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg,
                transparent 40%,
                rgba(167,139,250,0.05) 50%,
                transparent 60%);
            background-size: 200% 100%;
            animation: resultShimmer 3.5s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes resultShimmer {
            0%   { background-position: -100% 0; }
            100% { background-position: 250% 0; }
        }

        .result-card span:first-child {
            font-family: 'Orbitron', monospace;
            font-size: 0.58rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--glow);
            opacity: 0.65;
            display: block;
            margin-bottom: 8px;
        }

        #result {
            color: var(--green);
            font-weight: 600;
            font-size: 0.95rem;
            display: block;
            margin-top: 0;
            font-family: 'Exo 2', sans-serif;
            line-height: 1.5;
            text-shadow: 0 0 20px rgba(16,185,129,0.45);
        }
    </style>
</head>
<body>

    <!-- Ambient orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Floating sparkle particles -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div class="container">
        <h2><b>PHY SOPHEAK <br> Scaner QR 🪟</b></h2>
        
        <div id="reader"></div>

        <div class="result-card">
            <span>Scan Result:</span>
            <span id="result">Waiting for scan...</span>
        </div>
    </div>

    <script>
        // Callback function when a code is found
        function onScanSuccess(decodedText, decodedResult) {
            // Update the UI with the result
            document.getElementById('result').innerText = decodedText;
            
            // Optional: You could play a sound or send this to your 
            // Factory System API here
            console.log(`Scan Result: ${decodedText}`);
        }

        function onScanFailure(error) {
            // We ignore failures to keep the scanner silent during idle frames
        }

        // Initialize the scanner
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 10, 
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0 
            }, 
            false
        );

        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
